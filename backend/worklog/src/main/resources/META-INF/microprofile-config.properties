mongo.host=localhost
mongo.port=27017
mongo.database=appdb
mongo.username=admin
mongo.password=appdb

# This must match the 'issuer' attribute from your jwtBuilder exactly
mp.jwt.verify.issuer=https://my-oauth-app

# This points to the automatic JWK endpoint hosted by your Auth App!
# Format: https://<host>:<port>/jwt/ibm/api/<jwtBuilder_id>/jwk
mp.jwt.verify.publickey.location=https://localhost:9446/jwt/ibm/api/myBuilder/jwk